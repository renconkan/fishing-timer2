<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LURE TIMER</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lure Timer">
<meta name="theme-color" content="#020d18">
<!-- アイコン (SVGインライン生成) -->
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap');

  :root {
    --ocean-deep: #020d18;
    --ocean-mid: #041f33;
    --ocean-surface: #0a3a5c;
    --biolum: #00e5ff;
    --biolum-dim: #0097b2;
    --warn: #ff6b35;
    --silver: #b0c4d8;
    --white: #e8f4ff;
    --tide-up: #00e5ff;
    --tide-down: #4488aa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ocean-deep);
    min-height: 100vh;
    font-family: 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  .caustics {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 30% 20%, rgba(0,229,255,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 70% 70%, rgba(0,150,255,0.03) 0%, transparent 70%);
    animation: caustic-shift 8s ease-in-out infinite alternate;
  }
  @keyframes caustic-shift {
    0%   { transform: scale(1) rotate(0deg); opacity: 0.6; }
    100% { transform: scale(1.1) rotate(2deg); opacity: 1; }
  }

  .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .bubble {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,0.2);
    background: rgba(0,229,255,0.03);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(100vh); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-10vh); opacity: 0; }
  }

  .alert-flash {
    position: fixed; inset: 0;
    background: rgba(0,229,255,0.06);
    pointer-events: none; z-index: 999;
    opacity: 0; transition: opacity 0.1s;
  }
  .alert-flash.active { opacity: 1; }

  /* ===== レイアウト ===== */
  .page {
    position: relative; z-index: 10;
    max-width: 420px;
    margin: 0 auto;
    padding: 16px 14px 40px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.55em;
    color: var(--biolum-dim);
    text-align: center;
    margin-bottom: 12px;
  }

  /* ===== 場所セレクター ===== */
  .location-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    background: rgba(0,229,255,0.03);
    border: 1px solid rgba(0,229,255,0.1);
    border-radius: 6px;
    padding: 4px;
  }
  .loc-tab {
    flex: 1;
    padding: 7px 4px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--silver);
    font-size: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    letter-spacing: 0.03em;
    line-height: 1.3;
  }
  .loc-tab.active {
    background: rgba(0,229,255,0.15);
    color: var(--biolum);
    border: 1px solid rgba(0,229,255,0.3);
  }

  /* ===== 海況パネル ===== */
  .sea-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .info-card {
    background: rgba(4,31,51,0.7);
    border: 1px solid rgba(0,229,255,0.1);
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .info-card-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--biolum-dim);
    text-transform: uppercase;
  }
  .info-card-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .info-card-sub {
    font-size: 10px;
    color: var(--silver);
  }

  /* 風向きコンパス */
  .compass-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .compass {
    width: 38px;
    height: 38px;
    position: relative;
    flex-shrink: 0;
  }
  .compass-ring {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,0.2);
    position: absolute;
    inset: 0;
  }
  .compass-arrow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 3px;
    height: 16px;
    margin-left: -1.5px;
    margin-top: -14px;
    transform-origin: bottom center;
    background: linear-gradient(to bottom, var(--warn) 50%, rgba(176,196,216,0.4) 50%);
    border-radius: 2px 2px 0 0;
    transition: transform 0.8s cubic-bezier(0.34,1.56,0.64,1);
  }
  .compass-dir-text {
    display: flex;
    flex-direction: column;
  }

  /* 潮流矢印 */
  .current-arrow-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .current-arrow {
    font-size: 28px;
    transition: transform 0.6s ease;
    display: inline-block;
  }
  .current-info { display: flex; flex-direction: column; }

  /* ===== タイドグラフ ===== */
  .tide-section {
    background: rgba(4,31,51,0.7);
    border: 1px solid rgba(0,229,255,0.1);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--biolum-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .tide-canvas-wrap {
    position: relative;
    height: 90px;
  }
  #tideCanvas {
    width: 100%;
    height: 90px;
    display: block;
  }
  .tide-times {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }
  .tide-time-label {
    font-size: 9px;
    color: rgba(176,196,216,0.5);
    letter-spacing: 0.05em;
  }
  .tide-now-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,107,53,0.7);
    pointer-events: none;
  }
  .tide-now-dot {
    position: absolute;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--warn);
    box-shadow: 0 0 6px var(--warn);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* ===== タイマー ===== */
  .timer-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .ring-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 4px 0;
  }
  .ring-wrap svg {
    transform: rotate(-90deg);
    width: 220px;
    height: 220px;
  }
  .ring-bg { fill: none; stroke: rgba(0,229,255,0.08); stroke-width: 5; }
  .ring-progress {
    fill: none;
    stroke: var(--biolum);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 565;
    stroke-dashoffset: 0;
    filter: drop-shadow(0 0 6px var(--biolum));
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 60px;
    color: var(--biolum);
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,229,255,0.6), 0 0 60px rgba(0,229,255,0.2);
    transition: color 0.3s;
  }
  .time-display.warn { color: var(--warn); text-shadow: 0 0 30px rgba(255,107,53,0.5); }
  .time-label { font-size: 9px; letter-spacing: 0.3em; color: var(--silver); text-transform: uppercase; }

  .status-text {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--biolum-dim);
    text-transform: uppercase;
    height: 14px;
    text-align: center;
    margin-bottom: 8px;
  }
  .status-text.running { color: var(--biolum); }
  .status-text.change  { color: var(--warn); font-size: 12px; }

  /* インターバル設定 */
  .interval-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .interval-label { font-size: 9px; letter-spacing: 0.3em; color: var(--biolum-dim); text-transform: uppercase; }
  .interval-controls { display: flex; align-items: center; gap: 14px; }
  .interval-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.05);
    color: var(--biolum);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .interval-btn:hover { background: rgba(0,229,255,0.15); border-color: var(--biolum); }
  .interval-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--white);
    width: 70px;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .presets { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .preset-btn {
    padding: 3px 10px;
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 20px;
    background: transparent;
    color: var(--silver);
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .preset-btn:hover, .preset-btn.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--biolum);
    color: var(--biolum);
  }

  /* ボタン */
  .btn-row { display: flex; gap: 10px; width: 100%; justify-content: center; margin-bottom: 12px; }
  .btn-main {
    flex: 1; max-width: 150px; height: 48px;
    border: none; border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 0.2em;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-start {
    background: var(--biolum); color: var(--ocean-deep);
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
  }
  .btn-start:hover { box-shadow: 0 0 35px rgba(0,229,255,0.5); transform: translateY(-1px); }
  .btn-reset { background: transparent; border: 1px solid rgba(176,196,216,0.3); color: var(--silver); }
  .btn-reset:hover { border-color: var(--silver); color: var(--white); }

  /* カウンター */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.15), transparent);
    margin: 8px 0 12px;
  }
  .counter-section {
    display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%;
  }
  .counter-label { font-size: 9px; letter-spacing: 0.3em; color: var(--biolum-dim); text-transform: uppercase; }
  .counter-display { display: flex; align-items: baseline; gap: 5px; }
  .counter-num {
    font-family: 'Bebas Neue', sans-serif; font-size: 42px;
    color: var(--biolum); text-shadow: 0 0 20px rgba(0,229,255,0.3); line-height: 1;
  }
  .counter-unit { font-size: 11px; color: var(--silver); letter-spacing: 0.1em; }
  .history { margin-top: 8px; width: 100%; max-height: 60px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
  .history-item { font-size: 10px; color: rgba(176,196,216,0.5); text-align: center; letter-spacing: 0.08em; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-3px); } to { opacity:1; } }

  /* シミュ注記 */
  /* 上げ下げ表示 */
  .tide-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
  }
  .tide-phase-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: 1px solid;
  }
  .tide-phase-badge.rising {
    background: rgba(0,229,255,0.1);
    border-color: rgba(0,229,255,0.4);
    color: var(--biolum);
  }
  .tide-phase-badge.falling {
    background: rgba(68,136,170,0.15);
    border-color: rgba(68,136,170,0.4);
    color: #6ab4cc;
  }
  .tide-phase-arrow {
    font-size: 14px;
    line-height: 1;
  }
  .tide-remain {
    font-size: 11px;
    color: var(--silver);
    letter-spacing: 0.05em;
  }
  .tide-remain span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--white);
    margin: 0 2px;
  }

  .sim-note {
    text-align: center;
    font-size: 9px;
    color: rgba(176,196,216,0.3);
    letter-spacing: 0.1em;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="caustics"></div>
<div class="bubbles" id="bubbles"></div>
<div class="alert-flash" id="alertFlash"></div>

<div class="page">
  <div class="app-title">🎣 LURE CHANGE TIMER</div>

  <!-- 場所選択 -->
  <div class="location-tabs">
    <button class="loc-tab active" data-loc="mukogawa">武庫川<br>一文字</button>
    <button class="loc-tab" data-loc="nanko">南港<br>魚つり園</button>
    <button class="loc-tab" data-loc="awaji">淡路島</button>
  </div>

  <!-- 海況 -->
  <div class="sea-panel">
    <!-- 風向き -->
    <div class="info-card">
      <div class="info-card-label">風向き / 風速</div>
      <div class="compass-wrap">
        <div class="compass">
          <div class="compass-ring"></div>
          <div class="compass-arrow" id="windArrow"></div>
        </div>
        <div class="compass-dir-text">
          <div class="info-card-value" id="windDir">—</div>
          <div class="info-card-sub" id="windSpeed">— m/s</div>
        </div>
      </div>
    </div>

    <!-- 潮流 -->
    <div class="info-card">
      <div class="info-card-label">潮の流れ</div>
      <div class="current-arrow-wrap">
        <div class="current-arrow" id="currentArrow">→</div>
        <div class="current-info">
          <div class="info-card-value" id="currentDir">—</div>
          <div class="info-card-sub" id="currentSpeed">— kt</div>
        </div>
      </div>
    </div>
  </div>

  <!-- タイドグラフ -->
  <div class="tide-section">
    <div class="section-label">タイドグラフ（本日）</div>
    <div class="tide-canvas-wrap">
      <canvas id="tideCanvas"></canvas>
      <div class="tide-now-line" id="tideNowLine"></div>
      <div class="tide-now-dot" id="tideNowDot"></div>
    </div>
    <div class="tide-times">
      <span class="tide-time-label">0:00</span>
      <span class="tide-time-label">6:00</span>
      <span class="tide-time-label">12:00</span>
      <span class="tide-time-label">18:00</span>
      <span class="tide-time-label">24:00</span>
    </div>
    <div class="tide-status">
      <div class="tide-phase-badge rising" id="tidePhaseBadge">
        <span class="tide-phase-arrow" id="tidePhaseArrow">↑</span>
        <span id="tidePhaseLabel">上げ潮</span>
        <span id="tideElapsedMin" style="font-size:11px;opacity:0.8;margin-left:2px;">—分</span>
      </div>
      <div class="tide-remain">
        転流まで <span id="tideRemainMin">—</span> 分
      </div>
    </div>
  </div>

  <!-- タイマー -->
  <div class="timer-section">
    <div class="ring-wrap">
      <svg viewBox="0 0 190 190">
        <circle class="ring-bg" cx="95" cy="95" r="85"/>
        <circle class="ring-progress" id="ringProgress" cx="95" cy="95" r="85"/>
      </svg>
      <div class="ring-center">
        <div class="time-display" id="timeDisplay">20:00</div>
        <div class="time-label" id="timeLabel">次のチェンジまで</div>
      </div>
    </div>
    <div class="status-text" id="statusText">タイマーを開始してください</div>
  </div>

  <!-- インターバル -->
  <div class="interval-section">
    <div class="interval-label">インターバル（分）</div>
    <div class="interval-controls">
      <button class="interval-btn" id="decBtn">−</button>
      <div class="interval-value" id="intervalDisplay">20</div>
      <button class="interval-btn" id="incBtn">＋</button>
    </div>
    <div class="presets">
      <button class="preset-btn" data-val="5">5分</button>
      <button class="preset-btn" data-val="10">10分</button>
      <button class="preset-btn" data-val="15">15分</button>
      <button class="preset-btn active" data-val="20">20分</button>
      <button class="preset-btn" data-val="30">30分</button>
      <button class="preset-btn" data-val="45">45分</button>
      <button class="preset-btn" data-val="60">1時間</button>
    </div>
  </div>

  <!-- START/RESET -->
  <div class="btn-row">
    <button class="btn-main btn-start" id="startBtn">START</button>
    <button class="btn-main btn-reset" id="resetBtn">RESET</button>
  </div>

  <div class="divider"></div>

  <!-- カウンター -->
  <div class="counter-section">
    <div class="counter-label">ルアーチェンジ回数</div>
    <div class="counter-display">
      <div class="counter-num" id="changeCount">0</div>
      <div class="counter-unit">回</div>
    </div>
    <div class="history" id="history"></div>
  </div>

  <div class="sim-note">※ 海況データはシミュレーション値です</div>
</div>

<script>
// ===== 泡 =====
const bubblesEl = document.getElementById('bubbles');
for (let i = 0; i < 14; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const sz = 4 + Math.random() * 10;
  b.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${10+Math.random()*18}s;animation-delay:${Math.random()*14}s;`;
  bubblesEl.appendChild(b);
}

// ===== 場所データ =====
const LOCATIONS = {
  mukogawa: {
    name: '武庫川一文字',
    // 各タイム(時)の潮位(cm) 24点
    tide: [60,55,50,60,80,110,145,170,180,175,155,125,90,65,55,60,80,110,145,175,185,175,150,100],
    // 時刻ごとの風向き(deg, 0=N)・風速
    windDeg:   [200,210,215,200,190,180,175,170,165,160,160,155,150,150,155,160,170,175,180,190,200,210,215,210],
    windSpd:   [3,3,4,4,5,5,6,7,7,6,6,5,5,4,4,4,5,5,5,4,4,3,3,3],
    // 潮流方向ラベル・角度(CSS rotate)・速度
    currDir:   ['東','東','東北東','北東','北','北','北西','西','西','南西','南','南','南東','東','東','東','東北東','北東','北','北西','西','西','南西','南'],
    currDeg:   [90,90,70,45,0,0,315,270,270,225,180,180,135,90,90,90,70,45,0,315,270,270,225,180],
    currSpd:   [0.8,0.9,1.0,1.1,1.2,1.1,1.0,0.9,0.8,0.9,1.0,1.1,1.2,1.1,1.0,0.9,1.0,1.1,1.2,1.1,1.0,0.9,0.8,0.7],
  },
  nanko: {
    name: '南港魚つり園',
    tide: [55,50,48,55,75,100,135,162,175,170,148,118,85,60,52,55,75,105,138,168,178,168,142,95],
    windDeg:   [220,225,230,220,210,200,190,185,180,175,170,165,160,158,160,165,175,180,185,195,210,220,225,222],
    windSpd:   [2,2,3,3,4,5,5,6,6,5,5,4,4,3,3,3,4,4,5,4,3,3,2,2],
    currDir:   ['南東','南','南','南西','西','西','北西','北','北','北東','東','東','東南','南東','南東','南','南西','西','北西','北','北東','東','東南','南東'],
    currDeg:   [135,180,180,225,270,270,315,0,0,45,90,90,120,135,135,180,225,270,315,0,45,90,120,135],
    currSpd:   [0.6,0.7,0.8,0.9,1.0,1.0,0.9,0.8,0.7,0.8,0.9,1.0,1.0,0.9,0.8,0.7,0.8,0.9,1.0,0.9,0.8,0.7,0.6,0.5],
  },
  awaji: {
    name: '淡路島',
    tide: [80,70,62,70,95,130,168,195,205,198,172,138,100,72,62,68,95,130,168,198,208,196,165,115],
    windDeg:   [250,255,260,255,245,230,215,205,200,195,190,185,180,178,180,185,195,205,215,230,245,255,260,258],
    windSpd:   [5,5,6,6,7,8,8,9,9,8,7,7,6,5,5,5,6,7,8,8,7,6,5,5],
    currDir:   ['北西','北','北','北東','東','東','東南','南','南','南西','西','西','北西','北','北','北東','東','東南','南','南西','西','北西','北','北東'],
    currDeg:   [315,0,0,45,90,90,135,180,180,225,270,270,315,0,0,45,90,135,180,225,270,315,0,45],
    currSpd:   [1.2,1.3,1.4,1.5,1.6,1.5,1.4,1.3,1.2,1.3,1.4,1.5,1.6,1.5,1.4,1.3,1.4,1.5,1.6,1.5,1.4,1.3,1.2,1.1],
  }
};

const WIND_LABELS = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];

function degToLabel(deg) {
  const idx = Math.round(deg / 22.5) % 16;
  return WIND_LABELS[idx];
}

// ===== 状態 =====
let currentLoc = 'mukogawa';

function getNow() {
  const now = new Date();
  return { h: now.getHours(), min: now.getMinutes() };
}

function getHourFrac() {
  const { h, min } = getNow();
  return h + min / 60;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function getInterpolated(arr, hFrac) {
  const h0 = Math.floor(hFrac) % 24;
  const h1 = (h0 + 1) % 24;
  const t = hFrac - Math.floor(hFrac);
  return lerp(arr[h0], arr[h1], t);
}

function getDegInterpolated(arr, hFrac) {
  const h0 = Math.floor(hFrac) % 24;
  const h1 = (h0 + 1) % 24;
  const t = hFrac - Math.floor(hFrac);
  let a = arr[h0], b = arr[h1];
  // 最短経路補間
  let diff = b - a;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return (a + diff * t + 360) % 360;
}

// ===== タイドグラフ描画 =====
const tideCanvas = document.getElementById('tideCanvas');
const ctx = tideCanvas.getContext('2d');

function drawTide(locKey) {
  const data = LOCATIONS[locKey].tide;
  const W = tideCanvas.offsetWidth || 360;
  const H = 90;
  tideCanvas.width = W;
  tideCanvas.height = H;

  const minV = Math.min(...data) - 20;
  const maxV = Math.max(...data) + 20;
  const pad = { l: 6, r: 6, t: 6, b: 6 };

  function xAt(i) { return pad.l + (i / 24) * (W - pad.l - pad.r); }
  function yAt(v) { return pad.t + (1 - (v - minV) / (maxV - minV)) * (H - pad.t - pad.b); }

  // グリッド
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(0,229,255,0.06)';
  ctx.lineWidth = 1;
  [0,6,12,18,24].forEach(h => {
    ctx.beginPath();
    ctx.moveTo(xAt(h), pad.t);
    ctx.lineTo(xAt(h), H - pad.b);
    ctx.stroke();
  });

  // 満ち潮・引き潮グラデ
  const grad = ctx.createLinearGradient(0, pad.t, 0, H - pad.b);
  grad.addColorStop(0, 'rgba(0,229,255,0.25)');
  grad.addColorStop(1, 'rgba(0,229,255,0.02)');

  // 曲線（catmull-rom風 bezier近似）
  ctx.beginPath();
  ctx.moveTo(xAt(0), yAt(data[0]));
  for (let i = 0; i < 24; i++) {
    const x0 = xAt(i), y0 = yAt(data[i]);
    const x1 = xAt(i+1), y1 = yAt(data[(i+1)%24]);
    const mx = (x0 + x1) / 2;
    ctx.bezierCurveTo(mx, y0, mx, y1, x1, y1);
  }

  // 塗り
  ctx.lineTo(xAt(24), H - pad.b);
  ctx.lineTo(xAt(0), H - pad.b);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // 線
  ctx.beginPath();
  ctx.moveTo(xAt(0), yAt(data[0]));
  for (let i = 0; i < 24; i++) {
    const x0 = xAt(i), y0 = yAt(data[i]);
    const x1 = xAt(i+1), y1 = yAt(data[(i+1)%24]);
    const mx = (x0 + x1) / 2;
    ctx.bezierCurveTo(mx, y0, mx, y1, x1, y1);
  }
  ctx.strokeStyle = 'rgba(0,229,255,0.7)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 現在位置ライン
  const hFrac = getHourFrac();
  const xNow = xAt(hFrac);
  const yNow = yAt(getInterpolated(data, hFrac));

  document.getElementById('tideNowLine').style.left = xNow + 'px';
  const dot = document.getElementById('tideNowDot');
  dot.style.left = xNow + 'px';
  dot.style.top = yNow + 'px';

  // ===== 上げ/下げ計算 =====
  // 細かい分単位(5分刻み)でサンプリングして傾きを判定
  const nowMin = Math.round(hFrac * 60); // 現在の分
  const STEP = 5; // 5分後と比較

  function tideAtMin(m) {
    const hf = m / 60;
    return getInterpolated(data, hf % 24);
  }

  const vNow = tideAtMin(nowMin);
  const vNext = tideAtMin(nowMin + STEP);
  const rising = vNext >= vNow;

  // 次の極値（干潮/満潮）を探す：傾きが逆転するタイミング
  let turnMin = null;
  let prevSlope = rising ? 1 : -1;
  for (let m = nowMin + STEP; m <= nowMin + 60 * 12; m += STEP) {
    const va = tideAtMin(m);
    const vb = tideAtMin(m + STEP);
    const slope = vb >= va ? 1 : -1;
    if (slope !== prevSlope) {
      turnMin = m;
      break;
    }
    prevSlope = slope;
  }

  const remainMin = turnMin !== null ? Math.round(turnMin - nowMin) : null;

  // 直前の転流点（極値）を遡って探す
  let elapsedMin = null;
  let prevSlopeBack = rising ? 1 : -1;
  for (let m = nowMin - STEP; m >= nowMin - 60 * 12; m -= STEP) {
    const va = tideAtMin(m);
    const vb = tideAtMin(m + STEP);
    const slope = vb >= va ? 1 : -1;
    if (slope !== prevSlopeBack) {
      elapsedMin = Math.round(nowMin - (m + STEP));
      break;
    }
    prevSlopeBack = slope;
  }

  // UI更新
  const badge = document.getElementById('tidePhaseBadge');
  const arrow = document.getElementById('tidePhaseArrow');
  const label = document.getElementById('tidePhaseLabel');
  const remain = document.getElementById('tideRemainMin');
  const elapsed = document.getElementById('tideElapsedMin');

  if (rising) {
    badge.className = 'tide-phase-badge rising';
    arrow.textContent = '↑';
    label.textContent = '上げ潮';
  } else {
    badge.className = 'tide-phase-badge falling';
    arrow.textContent = '↓';
    label.textContent = '下げ潮';
  }
  elapsed.textContent = elapsedMin !== null ? elapsedMin + '分' : '—分';
  remain.textContent = remainMin !== null ? remainMin : '—';
}

// ===== 海況更新 =====
function updateSeaInfo(locKey) {
  const loc = LOCATIONS[locKey];
  const hFrac = getHourFrac();

  // 風
  const wDeg = getDegInterpolated(loc.windDeg, hFrac);
  const wSpd = getInterpolated(loc.windSpd, hFrac);
  document.getElementById('windArrow').style.transform = `rotate(${wDeg}deg)`;
  document.getElementById('windDir').textContent = degToLabel(wDeg);
  document.getElementById('windSpeed').textContent = wSpd.toFixed(1) + ' m/s';

  // 潮流
  const cDeg = getDegInterpolated(loc.currDeg, hFrac);
  const cSpd = getInterpolated(loc.currSpd, hFrac);
  const h0 = Math.floor(hFrac) % 24;
  document.getElementById('currentDir').textContent = loc.currDir[h0];
  document.getElementById('currentSpeed').textContent = cSpd.toFixed(1) + ' kt';

  // 潮流矢印（CSS rotate）
  const arrow = document.getElementById('currentArrow');
  // 矢印は右向き(→)が0deg基準。東=90deg→rotate(0), 北=0deg→rotate(-90), etc
  const arrowRotate = cDeg - 90;
  arrow.style.transform = `rotate(${arrowRotate}deg)`;

  drawTide(locKey);
}

// ===== 場所タブ =====
document.querySelectorAll('.loc-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.loc-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentLoc = tab.dataset.loc;
    updateSeaInfo(currentLoc);
  });
});

// ===== タイマー =====
let intervalMin = 20;
let totalSec = intervalMin * 60;
let remaining = totalSec;
let running = false;
let timer = null;
let changeCount = 0;
const CIRCUMFERENCE = 2 * Math.PI * 85; // r=85

const timeDisplay   = document.getElementById('timeDisplay');
const ringProgress  = document.getElementById('ringProgress');
const intervalDisp  = document.getElementById('intervalDisplay');
const startBtn      = document.getElementById('startBtn');
const resetBtn      = document.getElementById('resetBtn');
const changeCountEl = document.getElementById('changeCount');
const historyEl     = document.getElementById('history');
const alertFlash    = document.getElementById('alertFlash');
const statusText    = document.getElementById('statusText');

function fmt(sec) {
  return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
}

function updateRing() {
  const ratio = remaining / totalSec;
  const offset = CIRCUMFERENCE * (1 - ratio);
  ringProgress.style.strokeDasharray = CIRCUMFERENCE;
  ringProgress.style.strokeDashoffset = offset;
  const warn = remaining <= 60;
  ringProgress.style.stroke = warn ? 'var(--warn)' : 'var(--biolum)';
  ringProgress.style.filter = warn ? 'drop-shadow(0 0 8px var(--warn))' : 'drop-shadow(0 0 6px var(--biolum))';
  timeDisplay.classList.toggle('warn', warn);
  timeDisplay.textContent = fmt(remaining);
}

function updatePresets() {
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.val) === intervalMin);
  });
}

function setIntervalMin(min) {
  if (running) return;
  intervalMin = Math.max(1, Math.min(120, min));
  totalSec = intervalMin * 60;
  remaining = totalSec;
  intervalDisp.textContent = intervalMin;
  updateRing();
  updatePresets();
}

function flash() {
  [0, 400, 800].forEach(t => {
    setTimeout(() => {
      alertFlash.classList.add('active');
      setTimeout(() => alertFlash.classList.remove('active'), 300);
    }, t);
  });
}

function vibrate() { if (navigator.vibrate) navigator.vibrate([400,100,400,100,600]); }

function beep() {
  try {
    const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.22, 0.44].forEach((t, i) => {
      const o = ctx2.createOscillator();
      const g = ctx2.createGain();
      o.connect(g); g.connect(ctx2.destination);
      o.frequency.value = i < 2 ? 880 : 1200;
      o.type = 'sine';
      g.gain.setValueAtTime(0, ctx2.currentTime + t);
      g.gain.linearRampToValueAtTime(0.3, ctx2.currentTime + t + 0.05);
      g.gain.linearRampToValueAtTime(0, ctx2.currentTime + t + 0.25);
      o.start(ctx2.currentTime + t);
      o.stop(ctx2.currentTime + t + 0.3);
    });
  } catch(e) {}
}

function onComplete() {
  changeCount++;
  changeCountEl.textContent = changeCount;
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const item = document.createElement('div');
  item.className = 'history-item';
  item.textContent = `${ts} — ${changeCount}回目のチェンジ`;
  historyEl.insertBefore(item, historyEl.firstChild);
  beep(); vibrate(); flash();
  statusText.textContent = '🎣 ルアーチェンジ！';
  statusText.className = 'status-text change';
  clearInterval(timer);
  setTimeout(() => {
    remaining = totalSec;
    updateRing();
    if (running) {
      statusText.textContent = 'カウント中...';
      statusText.className = 'status-text running';
      timer = setInterval(tick, 1000);
    }
  }, 3000);
}

function tick() {
  remaining--;
  updateRing();
  if (remaining <= 0) { remaining = 0; updateRing(); onComplete(); }
}

startBtn.addEventListener('click', () => {
  if (!running) {
    running = true;
    startBtn.textContent = 'PAUSE';
    statusText.textContent = 'カウント中...';
    statusText.className = 'status-text running';
    timer = setInterval(tick, 1000);
  } else {
    running = false;
    clearInterval(timer);
    startBtn.textContent = 'START';
    statusText.textContent = '一時停止中';
    statusText.className = 'status-text';
  }
});

resetBtn.addEventListener('click', () => {
  running = false; clearInterval(timer);
  remaining = totalSec;
  startBtn.textContent = 'START';
  statusText.textContent = 'リセットしました';
  statusText.className = 'status-text';
  updateRing();
});

document.getElementById('decBtn').addEventListener('click', () => setIntervalMin(intervalMin - 5));
document.getElementById('incBtn').addEventListener('click', () => setIntervalMin(intervalMin + 5));
document.querySelectorAll('.preset-btn').forEach(b => {
  b.addEventListener('click', () => setIntervalMin(parseInt(b.dataset.val)));
});

// ===== PWA Service Worker 登録 =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

updateRing();
updatePresets();
updateSeaInfo(currentLoc);

// タイドグラフは毎分更新
setInterval(() => updateSeaInfo(currentLoc), 60000);
</script>

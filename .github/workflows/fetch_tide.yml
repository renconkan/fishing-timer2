name: Fetch Tide Data
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch tide data
        run: python3 fetch_tide.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tide_data.json
          git diff --cached --quiet || git commit -m "Update tide data $(date +'%Y-%m-%d')"
          git push
